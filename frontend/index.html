<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebJimp</title>
</head>

<body>
  <h1>WebJimp</h1>
  <button class="undo-btn">Undo</button>
  <button class="redo-btn">Redo</button>

  <div class="tabs">
    <button>Draw mode</button>
    <button>Snip mode</button>
  </div>

  <div class="toolbar draw-mode">
    <button class="cursor-btn">Select</button>
    <button class="paint-btn">Paintbrush</button>
    <button class="eraser-btn">Eraser</button>
    <div>
      Width: <input type="range" min="2" max="50" class="brush-width" />
    </div>
    <div class="color-btns">
    </div>
  </div>


  <div class="snip-mode">
    <div contenteditable class="image-submit"></div>
    <input type="file" accept="image/*" class="image-upload" />
    <span class="embed-status"></span>
    <button class="segment-btn" disabled>Segment</button>
    <button class="accept-btn">+</button>
  </div>

  <div class="draw-mode">
    <div class="layers"></div>
    <button class="addlayer-btn">+ Layer</button>
  </div>


  <div id="canvas-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
