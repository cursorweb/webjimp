<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebJimp</title>
</head>

<body>
  <h1>WebJimp</h1>
  <div class="tabs">
    <button>Draw mode</button>
    <button>Snip mode</button>
  </div>
  <div class="toolbar">
    <button>Cursor</button>
    <button>Paintbrush</button>
  </div>
  <div contenteditable class="image-submit"></div>
  <input type="file" accept="image/*" class="image-upload" />
  <span class="embed-status"></span>
  <button class="segment-btn" disabled>Segment</button>

  <div id="canvas-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
